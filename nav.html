<!-- FICHIER : nav.html (avec délai corrigé) -->
<!-- ======================================== -->
<nav id="lcdmh-nav">
    <!-- ... ton menu existant (inchangé) ... -->
</nav>

<style>
    /* ... tes styles existants (inchangés) ... */
</style>

<script>
// === NAVIGATION JS avec délai 400ms ===
(function(){
    var isMobile = function(){ return window.innerWidth <= 1000; };
    
    document.querySelectorAll('#lcdmh-nav .has-drop').forEach(function(item){
        var dd = item.querySelector('.dropdown');
        var timer = null;
        
        item.addEventListener('mouseenter', function(){ 
            if(!isMobile()){ 
                clearTimeout(timer); 
                dd.style.display='block'; 
            }
        });
        
        // ✅ DÉLAI PASSÉ DE 200 À 400ms
        item.addEventListener('mouseleave', function(){ 
            if(!isMobile()){ 
                timer=setTimeout(function(){ dd.style.display=''; },400); 
            }
        });
        
        dd.addEventListener('mouseenter', function(){ 
            if(!isMobile()) clearTimeout(timer); 
        });
        
        dd.addEventListener('mouseleave', function(){ 
            if(!isMobile()){ 
                timer=setTimeout(function(){ dd.style.display=''; },400); 
            }
        });
        
        // Mobile : clic
        item.querySelector(':scope>a').addEventListener('click',function(e){
            if(isMobile()){
                e.preventDefault();
                var open = dd.style.display==='block';
                document.querySelectorAll('#lcdmh-nav .dropdown').forEach(function(d){ d.style.display=''; });
                dd.style.display = open ? '' : 'block';
            }
        });
    });
    
    // Mobile toggle
    document.addEventListener('DOMContentLoaded',function(){
        var toggle = document.getElementById('menuToggle');
        var list   = document.getElementById('navLinks');
        if(!toggle||!list) return;
        
        toggle.addEventListener('click',function(e){ 
            e.stopPropagation(); 
            list.classList.toggle('active'); 
        });
        
        document.addEventListener('click',function(e){
            if(!list.contains(e.target)&&!toggle.contains(e.target)) 
                list.classList.remove('active');
        });
    });
})();
</script>
