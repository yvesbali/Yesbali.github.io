name: Daily Cloud LCDMH

on:
  schedule:
    # Tous les jours a 07h20 UTC, apres le feed YouTube du matin.
    - cron: '20 7 * * *'
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Envoyer le mail quotidien'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: daily-cloud-lcdmh
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
      YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
      YT_TOKEN_ANALYTICS: ${{ secrets.YT_TOKEN_ANALYTICS }}
      GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl google-auth google-auth-oauthlib google-api-python-client anthropic

      - name: Materialize local-only credentials
        shell: bash
        run: |
          if [ -n "$YT_CLIENT_SECRETS" ]; then
            printf '%s' "$YT_CLIENT_SECRETS" > client_secrets.json
          fi
          if [ -n "$YT_TOKEN_ANALYTICS" ]; then
            printf '%s' "$YT_TOKEN_ANALYTICS" > yt_token_analytics.json
          fi
          if [ -n "$GSC_TOKEN_JSON" ]; then
            printf '%s' "$GSC_TOKEN_JSON" > gsc_token.json
          fi
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" > .env
          fi

      - name: Update YouTube feed
        continue-on-error: true
        run: python fetch_youtube.py

      - name: SEO snapshot
        continue-on-error: true
        run: python seo_tracker.py --mode snapshot

      - name: Export Search Console
        continue-on-error: true
        run: python scripts/fetch_gsc.py

      - name: Append daily dashboard row
        run: python scripts/append_daily_log.py

      - name: Send daily email
        if: ${{ github.event_name == 'schedule' || inputs.send_email }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER || 'yvesbali@gmail.com' }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT || secrets.GMAIL_USER || 'yvesbali@gmail.com' }}
        run: python scripts/send_daily_email.py

      - name: Cleanup credentials
        if: always()
        run: rm -f client_secrets.json yt_token_analytics.json gsc_token.json .env

      - name: Commit generated daily files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/videos.json \
            data/trips/ \
            data/baselines/daily_stats_log.xlsx \
            data/baselines/gsc_queries_*.csv \
            seo_stats.json

          if git diff --cached --quiet; then
            echo "Aucun changement a committer."
            exit 0
          fi

          git commit -m "chore(stats): daily cloud snapshot $(date +%F)"
          git pull --rebase origin main
          git push
