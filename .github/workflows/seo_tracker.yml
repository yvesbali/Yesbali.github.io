name: LCDMH – SEO Tracker mensuel

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth-oauthlib google-api-python-client anthropic

      - name: Setup credentials
        run: |
          echo '${{ secrets.YT_CLIENT_SECRETS }}' > client_secrets.json
          echo '${{ secrets.YT_TOKEN_ANALYTICS }}' > yt_token_analytics.json
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env

      - name: Run SEO Tracker
        run: python seo_tracker.py --mode report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Copy report to site
        run: |
          mkdir -p seo
          cp seo_report_*.html seo/seo-report.html || echo "Pas de rapport"

      - name: Push rapport sur lcdmh.com
        run: |
          git config user.name "LCDMH Bot"
          git config user.email "yvesbali@gmail.com"
          git add seo/seo-report.html seo_stats.json
          git diff --staged --quiet || git commit -m "SEO Report $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Envoyer email rapport
        run: python send_report_email.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_URL: "https://yvesbali.github.io/seo/seo-report.html"
