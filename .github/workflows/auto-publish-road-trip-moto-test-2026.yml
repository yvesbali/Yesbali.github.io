name: Auto-publish road trip videos
on:
  schedule:
    - cron: '0 7 * * *'  # Tous les jours a 09:00 heure de Paris
  workflow_dispatch:  # Declenchement manuel possible

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch new videos and inject
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          python scripts/auto_publish_roadtrip.py \
            --config data/roadtrips/road-trip-moto-test-2026/auto_publish_config.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-publish: nouvelles videos road-trip-moto-test-2026"
          git push
