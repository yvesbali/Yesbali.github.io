@"
name: Auto-publish road-trip-moto-cols-suisse-tyrol-et-dolomites-2026
on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install google-api-python-client google-auth reportlab
      - name: Fetch and inject new videos
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN_ANALYTICS: ${{ secrets.YT_TOKEN_ANALYTICS }}
        run: |
          python scripts/auto_publish_roadtrip.py \
            --config data/roadtrips/road-trip-moto-cols-suisse-tyrol-et-dolomites-2026/auto_publish_config.json
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-publish: nouvelles videos road-trip-moto-cols-suisse-tyrol-et-dolomites-2026"
          git push
"@ | Set-Content -Path ".github\workflows\auto-publish-road-trip-moto-cols-suisse-tyrol-et-dolomites-2026.yml" -Encoding UTF8

git add .
git commit -m "Workflow 10h-20h Paris exact (8h-18h UTC)"
git push origin main