name: Recyclage Social LCDMH
on:
  schedule:
    - cron: '35 13 * * 2,4,6'  # Mar/Jeu/Sam à 13h35 UTC — réduit le 17/04/2026 (était quotidien)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deno (required by yt-dlp for YouTube JS challenges)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: pip install yt-dlp requests

      - name: Setup YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > cookies.txt
            echo "Cookies YouTube charges"
          else
            echo "ATTENTION: secret YOUTUBE_COOKIES absent"
          fi

      - name: Publish shorts du jour
        run: python scripts/cron_recyclage_social.py

      - name: Cleanup cookies
        if: always()
        run: rm -f cookies.txt

      - name: Commit historique
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Recyclage social: publications du jour"
          git pull --rebase origin main || true
          git push