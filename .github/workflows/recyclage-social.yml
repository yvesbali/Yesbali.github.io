name: Recyclage Social LCDMH
on:
  schedule:
    - cron: '50 10 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Publish shorts du jour
        run: python scripts/cron_recyclage_social.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Aucun changement"
            exit 0
          fi
          git commit -m "Recyclage social: publications du jour"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "Retry..."
            sleep 5
          done
          echo "Push echoue apres 5 tentatives"
          exit 1
