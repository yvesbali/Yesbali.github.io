name: Facebook Auto

on:
  workflow_dispatch:
  schedule:
     - cron: '0 8 * * 0' # S'exécute tous les dimanches à 8h

permissions:
  contents: write

jobs:
  build-facebook-payload:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automation/facebook_site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 # On installe les outils nécessaires

      - name: Run Flashback Scanner
        run: python prepare_facebook_payload.py # On lance l'ouvrier

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Mise à jour automatique du flashback"
          git push
