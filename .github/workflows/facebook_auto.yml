name: Facebook Auto

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 0"

permissions:
  contents: write

jobs:
  build-facebook-payload:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automation/facebook_site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Generate selection
        run: python select_facebook_post.py

      - name: Build Facebook post
        run: python build_facebook_post_v2.py

      - name: Prepare payload
        run: python prepare_facebook_payload.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add facebook_post_selected.json facebook_post_ready.txt facebook_post_ready.json facebook_payload_test.json site_posts_state.json
          git diff --cached --quiet || git commit -m "Mise à jour automatique du payload Facebook"
          git push
