import json
import re
import requests
import random
import os

# --- CONFIGURATION ---
WEBHOOK_URL = "https://hook.eu1.make.com/eaa6xfheiv6uriro4ek6hjvcihew6n1f"

def get_yt_id(url):
    """Extrait l'ID de 11 caractères d'une vidéo YouTube proprement"""
    pattern = r'(?:v=|embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})'
    match = re.search(pattern, url)
    return match.group(1) if match else None

# --- LOGIQUE DE SELECTION ---
# On vérifie s'il y a un nouveau post manuel, sinon on pioche dans les archives
try:
    if os.path.exists('facebook_post_selected.json'):
        with open('facebook_post_selected.json', 'r', encoding='utf-8') as f:
            data = json.load(f)
            mode = "production"
    else:
        # ICI : Ton garage de vidéos 2022/2023 (ajoute tes liens ici)
        archives = [
            {"title": "Road Trip Cap Nord", "link": "https://lcdmh.com/cap-nord-moto.html", "yt": "https://youtu.be/dQw4w9WgXcQ"},
            {"title": "Test Intercom Sena", "link": "https://lcdmh.com/test-sena.html", "yt": "https://youtu.be/dQw4w9WgXcQ"},
            # Ajoute d'autres lignes comme ça pour tes anciens contenus
        ]
        data = random.choice(archives)
        mode = "flashback"
except:
    print("Erreur de lecture, arrêt.")
    exit()

# --- PREPARATION DU PAYLOAD ---
video_id = get_yt_id(data.get('yt', ''))

# On utilise hqdefault.jpg car Pinterest l'accepte toujours (contrairement à maxres)
image_propre = f"https://img.youtube.com/vi/{video_id}/hqdefault.jpg" if video_id else "https://lcdmh.com/images/logo-social.jpg"

payload = {
    "mode": mode,
    "title": data.get('title'),
    "message": f"🔙 FLASHBACK : {data.get('title')}" if mode == "flashback" else data.get('message'),
    "link": data.get('link'),
    "image_url": image_propre,
    "yt_id": video_id
}

# --- ENVOI A MAKE ---
print(f"Envoi vers Make ({mode}) : {payload['title']}")
res = requests.post(WEBHOOK_URL, json=payload)

if res.status_code == 200:
    print("✅ Données envoyées avec succès !")
else:
    print(f"❌ Erreur {res.status_code}")
