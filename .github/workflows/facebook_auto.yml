name: Facebook Auto

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 0'

# Règle l'avertissement Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-facebook-payload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation/facebook_site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Flashback Scanner
        run: python prepare_facebook_payload.py

      - name: Commit History File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add historique_publications.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Mise à jour de l'historique" && git push)
