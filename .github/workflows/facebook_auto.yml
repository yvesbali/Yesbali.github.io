name: Pinterest & Facebook Auto

on:
  workflow_dispatch: # Pour pouvoir le lancer manuellement pour tester
  schedule:
    - cron: '0 8 * * 0' # S'exécute tous les dimanches à 8h00

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des outils
        run: pip install requests beautifulsoup4

      - name: Lancement du script de publication
        run: python automation/facebook_site/facebook_auto.py
