name: Facebook Auto

on:
  workflow_dispatch:
  schedule:
     - cron: '0 8 * * 0' # S'exécute automatiquement tous les dimanches à 8h00

# Supprime l'avertissement de dépréciation Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-facebook-payload:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automation/facebook_site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      -
