name: Blogger Auto-Publisher LCDMH

on:
  schedule:
    - cron: '0 10 * * 2'
    - cron: '0 10 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Publish next article to Blogger
        env:
          MAKE_WEBHOOK_BLOGGER: ${{ secrets.MAKE_WEBHOOK_BLOGGER }}
        run: python scripts/blogger_publisher.py

      - name: Commit tracking update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles_published_blogger.json
          git diff --staged --quiet || git commit -m "Blogger: article publie $(date +%Y-%m-%d)"
          git push
