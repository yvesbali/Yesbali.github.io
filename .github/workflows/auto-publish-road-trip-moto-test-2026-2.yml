name: Auto-publish road-trip-moto-test-2026-2
on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 11 * * *'
    - cron: '0 13 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'
    - cron: '0 23 * * *'
    - cron: '0 1 * * *'
    - cron: '0 3 * * *'
    - cron: '0 5 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Fetch and inject new videos
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN_ANALYTICS: ${{ secrets.YT_TOKEN_ANALYTICS }}
        run: |
          python scripts/auto_publish_roadtrip.py \
            --config data/roadtrips/road-trip-moto-test-2026-2/auto_publish_config.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-publish: nouvelles videos road-trip-moto-test-2026-2"
          git push
