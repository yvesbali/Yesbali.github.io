name: Auto-publish road-trip-moto-sandbox-test
on:
  schedule:
    - cron: '15 15 * * *'
    - cron: '20 15 * * *'
    - cron: '25 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Fetch and inject new videos
        id: inject
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN_ANALYTICS: ${{ secrets.YT_TOKEN_ANALYTICS }}
        run: |
          python scripts/auto_publish_roadtrip.py \
            --config data/roadtrips/road-trip-moto-sandbox-test/auto_publish_config.json 2>&1 | tee /tmp/result.txt
          echo "log<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/result.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-publish: nouvelles videos road-trip-moto-sandbox-test"
          git push

      - name: Send email notification
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import smtplib
          from email.mime.text import MIMEText
          import os
          log = '''${{ steps.inject.outputs.log }}'''
          status = 'OK' if '${{ steps.inject.outcome }}' == 'success' else 'ERREUR'
          msg = MIMEText(f'Statut: {status}\n\nLog:\n{log}', 'plain', 'utf-8')
          msg['Subject'] = f'LCDMH Auto-publish {status} - road-trip-moto-sandbox-test'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          print('Email envoye')
          "
