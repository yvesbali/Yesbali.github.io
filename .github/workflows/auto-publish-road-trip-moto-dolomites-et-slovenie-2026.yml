name: 🏍️ Auto-publish road-trip-moto-dolomites-et-slovenie-2026

on:
  schedule:
    # Tous les jours à 19h UTC (21h heure française été)
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth requests reportlab jinja2

      - name: Fetch and inject new videos
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN_ANALYTICS: ${{ secrets.YT_TOKEN_ANALYTICS }}
        run: |
          python scripts/auto_publish_roadtrip.py \
            --slug road-trip-moto-dolomites-et-svlovenie-2026 \
            --roadtrip-dir roadtrips

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "🏍️ [Auto-publish] Slovénie $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
