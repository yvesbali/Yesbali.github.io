name: Auto-publish road trip videos
on:
  schedule:
    - cron: '45 14 * * *'  # Tous les jours a 16:45 heure de Paris
  workflow_dispatch:  # Declenchement manuel possible

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Fetch new videos and inject
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN_ANALYTICS: ${{ secrets.YT_TOKEN_ANALYTICS }}
        run: |
          python scripts/auto_publish_roadtrip.py \
            --config data/roadtrips/road-trip-moto-test-3-2026/auto_publish_config.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-publish: nouvelles videos road-trip-moto-test-3-2026"
          git push
