import json, re, requests, random, os, csv
from bs4 import BeautifulSoup
from datetime import datetime

# --- CONFIGURATION ---
SITE_URL = "https://lcdmh.com"
WEBHOOK_URL = "https://hook.eu1.make.com/eaa6xfheiv6uriro4ek6hjvcihew6n1f"
HISTORY_FILE = "historique_publications.csv"

def get_site_content():
    links = []
    try:
        res = requests.get(SITE_URL, timeout=15)
        soup = BeautifulSoup(res.text, 'html.parser')
        for a in soup.find_all('a', href=True):
            href = a['href']
            if href.endswith('.html') and 'index' not in href:
                full_url = href if href.startswith('http') else f"{SITE_URL}/{href.lstrip('/')}"
                if full_url not in links: links.append(full_url)
    except: pass
    return links

def analyze_page(url):
    try:
        res = requests.get(url, timeout=15)
        soup = BeautifulSoup(res.text, 'html.parser')
        title = soup.title.string.replace(' - LCDMH', '') if soup.title else "Souvenir LCDMH"
        yt_match = re.search(r'(?:v=|embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})', res.text)
        yt_id = yt_match.group(1) if yt_match else None
        
        category = "Roadtrips"
        url_lower = url.lower()
        if any(x in url_lower or x in title.lower() for x in ["test", "essai", "sena", "casque"]):
            category = "Tests Équipement"
        elif any(x in url_lower or x in title.lower() for x in ["tuto", "mecanique", "astuce"]):
            category = "Tutos Moto"
        
        image_url = f"https://img.youtube.com/vi/{yt_id}/hqdefault.jpg" if yt_id else f"{SITE_URL}/images/logo-social.jpg"
        return {"title": title, "link": url, "category": category, "image_url": image_url}
    except: return None

# --- EXECUTION ---
all_links = get_site_content()
if all_links:
    post = analyze_page(random.choice(all_links))
    if post:
        payload = {
            "mode": "flashback",
            "title": post['title'],
            "category": post['category'], 
            "message": f"🔙 FLASHBACK : {post['title']}",
            "link": post['link'],
            "image_url": post['image_url']
        }
        
        # 1. ENVOI A MAKE
        requests.post(WEBHOOK_URL, json=payload)

        # 2. SAUVEGARDE DANS L'HISTORIQUE (L'export que tu voulais)
        file_exists = os.path.isfile(HISTORY_FILE)
        with open(HISTORY_FILE, mode='a', newline='', encoding='utf-8') as f:
            writer = csv.writer(f)
            if not file_exists:
                writer.writerow(['Date', 'Titre', 'Categorie', 'Lien'])
            writer.writerow([datetime.now().strftime("%d/%m/%Y %H:%M"), post['title'], post['category'], post['link']])
        
        print(f"✅ Historique mis à jour : {post['title']}")
